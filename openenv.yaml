name: autonomous-traffic-control
version: 0.1.0
entrypoint: env.environment:TrafficEnv

tasks:
  - name: easy
    description: Light traffic scenario
    grader:
      type: reward_threshold
      threshold: 0.2

  - name: medium
    description: Moderate traffic scenario
    grader:
      type: reward_threshold
      threshold: 0.4

  - name: hard
    description: Heavy traffic scenario
    grader:
      type: reward_threshold
      threshold: 0.6