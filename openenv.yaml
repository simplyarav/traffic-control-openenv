spec_version: 1
name: autonomous-traffic-control
entrypoint: env.environment:TrafficEnv

tasks:
  - id: easy
    description: Low traffic
    grader:
      type: numeric
      min: 0
      max: 1
      pass_threshold: 0.3

  - id: medium
    description: Medium traffic
    grader:
      type: numeric
      min: 0
      max: 1
      pass_threshold: 0.5

  - id: hard
    description: Heavy traffic
    grader:
      type: numeric
      min: 0
      max: 1
      pass_threshold: 0.7