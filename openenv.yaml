name: autonomous-traffic-control
version: 0.1.0
entrypoint: env.environment:TrafficEnv

tasks:
  - name: easy
    description: Low traffic scenario
    graders:
      - type: score
        pass_threshold: 0.2

  - name: medium
    description: Medium traffic scenario
    graders:
      - type: score
        pass_threshold: 0.4

  - name: hard
    description: Heavy traffic scenario
    graders:
      - type: score
        pass_threshold: 0.6