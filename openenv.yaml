spec_version: 1
name: autonomous-traffic-control
version: 0.1.0
type: environment
runtime: docker
app: app.py
port: 7860

tasks:
  - name: easy
    description: Low traffic scenario
    graders:
      - type: score
        pass_threshold: 0.3

  - name: medium
    description: Medium traffic scenario
    graders:
      - type: score
        pass_threshold: 0.5

  - name: hard
    description: Heavy traffic scenario
    graders:
      - type: score
        pass_threshold: 0.7